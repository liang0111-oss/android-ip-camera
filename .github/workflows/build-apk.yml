name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate signing key
        run: |
          keytool -genkeypair -v \
            -keystore signing-key.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias key0 \
            -storepass android \
            -keypass android \
            -dname "CN=Build, OU=Build, O=Build, L=Build, ST=Build, C=US"

      - name: Create signing.properties
        run: |
          cat > signing.properties << 'EOF'
          storeFile=signing-key.jks
          storePassword=android
          keyAlias=key0
          keyPassword=android
          EOF

      - name: Build release APK (universal)
        run: |
          ./gradlew clean :app:assembleRelease \
            -PenableAbiSplits=false \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ip-camera-universal
          path: app/build/outputs/apk/release/*universal-release.apk
          retention-days: 30
